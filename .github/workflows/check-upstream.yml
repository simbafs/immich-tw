name: Check Upstream Release

on:
    schedule:
        - cron: '0 0 * * *'
    workflow_dispatch:

jobs:
    check-upstream:
        runs-on: ubuntu-latest
        outputs:
            new_release: ${{ steps.check.outputs.new_release }}
            latest_version: ${{ steps.check.outputs.latest_version }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  sparse-checkout: |
                      .github/workflows/upstream-version
                  sparse-checkout-cone-mode: false

            - name: Check for new release
              id: check
              run: |
                  CURRENT_VERSION=$(cat .github/workflows/upstream-version 2>/dev/null || echo "")
                  LATEST_VERSION=$(curl -sL https://api.github.com/repos/immich-app/immich/releases/latest | jq -r .tag_name)

                  echo "Current version: $CURRENT_VERSION"
                  echo "Latest version: $LATEST_VERSION"

                  if [ "$LATEST_VERSION" != "$CURRENT_VERSION" ]; then
                    echo "new_release=true" >> $GITHUB_OUTPUT
                    echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
                    echo "$LATEST_VERSION" > .github/workflows/upstream-version
                  else
                    echo "new_release=false" >> $GITHUB_OUTPUT
                    echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
                  fi

            - name: Commit version file
              if: steps.check.outputs.new_release == 'true'
              run: |
                  git config --local user.email "action@github.com"
                  git config --local user.name "GitHub Action"
                  git add .github/workflows/upstream-version
                  git commit -m "Update upstream version to ${{ steps.check.outputs.latest_version }}"

            - name: Push changes
              if: steps.check.outputs.new_release == 'true'
              run: git push

            - name: Trigger Docker build
              if: steps.check.outputs.new_release == 'true'
              run: |
                  curl -X POST \
                    -H "Accept: application/vnd.github+json" \
                    -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                    -H "X-GitHub-Api-Version: 2022-11-28" \
                    https://api.github.com/repos/${{ github.repository }}/dispatches \
                    -d '{"event_type":"upstream-release","client_payload":{"version":"${{ steps.check.outputs.latest_version }}"}}'
